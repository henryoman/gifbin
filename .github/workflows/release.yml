name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package, without the leading v"
        required: true
        default: "0.0.0"

permissions:
  contents: write

jobs:
  macos:
    name: macOS Release
    runs-on: macos-15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Native SDK CLI
        run: bun add -g @native-sdk/cli@0.4.1

      - name: Configure release version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          ./scripts/configure-native-sdk-path
          ./scripts/set-version "$version"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Validate and build
        run: |
          zig build test
          zig build -Doptimize=ReleaseSafe
          native validate app.zon
          native doctor --manifest app.zon --strict

      - name: Package app
        run: native package --target macos --manifest app.zon --binary zig-out/bin/gifbin

      - name: Zip package
        run: |
          mkdir -p dist
          ditto -c -k --keepParent zig-out/package/gifbin.app "dist/gifbin-${VERSION}-macos.zip"
          shasum -a 256 "dist/gifbin-${VERSION}-macos.zip" > "dist/gifbin-${VERSION}-macos.zip.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: gifbin v${{ env.VERSION }}
          draft: false
          prerelease: ${{ env.VERSION == '0.0.0' }}
          generate_release_notes: true
          files: |
            dist/gifbin-${{ env.VERSION }}-macos.zip
            dist/gifbin-${{ env.VERSION }}-macos.zip.sha256
